<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment AI Full Notes Upgrade</title>

<!-- Quill Style -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
body { font-family: Arial, sans-serif; margin: 20px; }

/* --- Questions & Answers / Screenshots --- */
.qa-container {
  width: 100%;
  max-width: 700px;
  background: #f0f0f0;
  border: 2px solid #8888ff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 30px;
}
.qa-container h2 { color: #3333cc; margin-top: 0; }
.qa-content { max-height: 250px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }

/* --- Old Quick Notes --- */
.old-notes {
  width: 100%;
  max-width: 500px;
  background: #f8f8ff;
  border: 2px solid #6666ff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 30px;
}
.old-notes h2 { color: #3333cc; margin-top: 0; }
#notesEditor { width: 100%; height: 120px; margin-bottom: 10px; }

/* --- New Call Log --- */
.notes-container {
  width: 100%;
  max-width: 650px;
  background: #fff8f8;
  border: 2px solid #ff4d4d;
  border-radius: 12px;
  padding: 15px;
}
.notes-container h2 { color: #cc0000; margin-top: 0; }

#editor { height: 150px; background: white; border-radius: 8px; margin-bottom: 10px; }
#logs {
  margin-top: 15px;
  max-height: 250px;
  overflow-y: auto;
  border-top: 1px solid #ddd;
  padding-top: 10px;
}
.log-entry { background: white; border-left: 4px solid #ff4d4d; padding: 8px; margin-bottom: 8px; border-radius: 6px; }
.timestamp { font-size: 12px; color: gray; margin-bottom: 5px; }

.notes-actions { display: flex; gap: 10px; margin-top: 10px; }
.notes-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #ff4d4d;
  color: white;
  cursor: pointer;
}
.notes-actions button:hover { background: #cc0000; }
</style>
</head>

<body>

<!-- 1️⃣ Questions & Answers / Screenshots -->
<div class="qa-container">
  <h2>📋 Questions & Answers / Screenshots</h2>
  <div class="qa-content" id="qaContent">
    <!-- Existing content stays here -->
  </div>
</div>

<!-- 2️⃣ Old Quick Notes -->
<div class="old-notes">
  <h2>📝 Quick Notes</h2>
  <textarea id="notesEditor" placeholder="Write quick notes here..."></textarea>
  <button onclick="saveOldNotes()">💾 Save Quick Notes</button>
</div>

<!-- 3️⃣ New Call Log Notes -->
<div class="notes-container">
  <h2>📝 Call Log Notes</h2>
  <div id="editor"></div>
  <div class="notes-actions">
    <button onclick="addLog()">➕ Add Entry</button>
    <button onclick="clearLogs()">🗑 Clear All</button>
  </div>
  <div id="logs"></div>
</div>

<!-- Quill Script -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
// --- OLD Quick Notes ---
function saveOldNotes() {
  const content = document.getElementById("notesEditor").value;
  localStorage.setItem("oldNotes", content);
  alert("Quick notes saved!");
}

// --- NEW Call Log Notes ---
var quill = new Quill('#editor', { theme: 'snow' });
let logs = JSON.parse(localStorage.getItem("callLogs")) || [];

function addLog() {
  const content = quill.root.innerHTML;
  if (!content.trim()) return;

  const time = new Date().toLocaleString();
  const entry = { time: time, content: content };
  logs.unshift(entry);
  localStorage.setItem("callLogs", JSON.stringify(logs));

  quill.root.innerHTML = "";
  displayLogs();
}

function displayLogs() {
  const container = document.getElementById("logs");
  container.innerHTML = "";
  logs.forEach(log => {
    const div = document.createElement("div");
    div.className = "log-entry";
    div.innerHTML = `<div class="timestamp">${log.time}</div><div>${log.content}</div>`;
    container.appendChild(div);
  });
}

function clearLogs() {
  logs = [];
  localStorage.removeItem("callLogs");
  displayLogs();
}

// --- PAGE LOAD ---
window.onload = function() {
  // Load old notes
  const savedOld = localStorage.getItem("oldNotes");
  if (savedOld) document.getElementById("notesEditor").value = savedOld;

  // Display call logs
  displayLogs();

  // QA content stays intact
}
</script>

</body>
</html>
