<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment AI Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0F172A;
    color: white;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 900px;
    max-width: 95%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  h1 { text-align:center; margin-bottom:10px; color:#F87171; }

  /* Panels */
  .panel {
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  }

  .panel-light { background:#F3F4F6; color:#111; }
  .panel-dark { background:#1E293B; color:white; }

  /* Input fields */
  input[type="text"], textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border:none;
    margin-top: 8px;
    box-sizing: border-box;
    font-size: 14px;
  }

  /* Buttons */
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 14px;
    margin-top: 10px;
    transition: all 0.2s;
  }

  .btn-blue { background:#3B82F6; }
  .btn-blue:hover { background:#2563EB; }

  .btn-red { background:#EF4444; }
  .btn-red:hover { background:#B91C1C; }

  .btn-green { background:#10B981; }
  .btn-green:hover { background:#059669; }

  .btn-yellow { background:#FACC15; color:#111; }
  .btn-yellow:hover { background:#EAB308; }

  /* Output box */
  #output {
    background:#111827;
    border-radius:12px;
    padding:20px;
    min-height:120px;
    white-space:pre-wrap;
    color:#F9FAFB;
  }

  /* Shortcut buttons */
  .shortcuts { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }

  /* Q&A Entries */
  .qa-entry {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#E5E7EB;
    padding:8px;
    border-radius:8px;
    margin-top:5px;
  }

  .qa-entry span { flex:1; }

  .qa-entry button { margin-left:5px; }

  @media (max-width:768px) {
    .container { width:100%; }
    .shortcuts { flex-direction:column; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Appointment AI</h1>

  <div id="output">Response will appear here...</div>

  <!-- Input Section -->
  <div class="panel panel-dark">
    <input type="text" id="userInput" placeholder="Type customer message here..." />
    <button class="btn-blue" onclick="handleSubmit()">Submit</button>

    <p>📌 Tip: Take a screenshot and press Ctrl+V / Cmd+V to get AI response automatically.</p>

    <!-- Shortcut buttons -->
    <div class="shortcuts">
      <button class="btn-red" onclick="quickReply('too expensive')">Too Expensive</button>
      <button class="btn-green" onclick="quickReply('already have marketing')">Already Have Marketing</button>
      <button class="btn-yellow" onclick="quickReply('busy call later')">Busy / Call Later</button>
      <button class="btn-red" onclick="quickReply('not interested')">Not Interested</button>
    </div>
  </div>

  <!-- Add Q&A Panel -->
  <div class="panel panel-light">
    <h3>Add New Q&A</h3>
    <input type="text" id="newKeywords" placeholder="Enter keywords (comma-separated)">
    <textarea id="newAnswer" placeholder="Enter the answer"></textarea>
    <button class="btn-blue" id="addQBtn">Add Q&A</button>
  </div>

  <!-- Manage Q&A Panel -->
  <div class="panel panel-light">
    <h3>Manage Existing Q&A</h3>
    <div id="qaList"></div>
  </div>
</div>

<script>
let knowledgeBase = [
  { keywords:["price","cost","how much"], response:"Our service improves your Google visibility. Pricing depends on needs; I can connect you with a specialist." },
  { keywords:["not interested","no thanks"], response:"Totally understand! Are you getting consistent leads from Google?" },
  { keywords:["busy","call later"], response:"No problem! When would be a better time for a quick call?" },
  { keywords:["what is this","who are you"], response:"We help local businesses improve their Google presence and get more customers." },
  { keywords:["already have","we have marketing"], response:"That’s great! Most clients already have marketing. We just help improve Google results." },
  { keywords:["send info","email me"], response:"I can send info, but most owners prefer a quick call. Would a short call work?" }
];

function getResponse(input){
  input=input.toLowerCase();
  for(let item of knowledgeBase){
    for(let keyword of item.keywords){
      if(input.includes(keyword)) return item.response;
    }
  }
  return "Got it! Can you tell me more so I can assist?";
}

function handleSubmit(){
  const input=document.getElementById("userInput").value;
  document.getElementById("output").innerText=getResponse(input);
}

function quickReply(keyword){
  document.getElementById("output").innerText=getResponse(keyword);
}

// Q&A Management
function updateQAManage(){
  const qaList=document.getElementById('qaList');
  qaList.innerHTML='';
  knowledgeBase.forEach((item,index)=>{
    const div=document.createElement('div');
    div.className='qa-entry';
    div.innerHTML=`<span><b>Keywords:</b> ${item.keywords.join(', ')}<br><b>Answer:</b> ${item.response}</span>
                   <button class="btn-red" onclick="editQA(${index})">Edit</button>
                   <button class="btn-red" onclick="deleteQA(${index})">Delete</button>`;
    qaList.appendChild(div);
  });
}

function editQA(index){
  const newKeywords=prompt("Edit keywords (comma separated):",knowledgeBase[index].keywords.join(', '));
  const newAnswer=prompt("Edit answer:",knowledgeBase[index].response);
  if(newKeywords!==null && newAnswer!==null){
    knowledgeBase[index].keywords=newKeywords.split(',').map(k=>k.trim());
    knowledgeBase[index].response=newAnswer.trim();
    updateQAManage();
    alert("Q&A updated!");
  }
}

function deleteQA(index){
  if(confirm("Are you sure you want to delete this entry?")){
    knowledgeBase.splice(index,1);
    updateQAManage();
  }
}

document.getElementById('addQBtn').addEventListener('click',()=>{
  const keywords=document.getElementById('newKeywords').value.trim().toLowerCase().split(',').map(k=>k.trim()).filter(k=>k);
  const answer=document.getElementById('newAnswer').value.trim();
  if(keywords.length && answer){
    knowledgeBase.push({keywords,response:answer});
    document.getElementById('newKeywords').value='';
    document.getElementById('newAnswer').value='';
    updateQAManage();
    alert("New Q&A added!");
  } else alert("Please fill both keywords and answer.");
});

// Screenshot paste-to-OCR
document.addEventListener('paste',async (event)=>{
  const items=event.clipboardData.items;
  for(let i=0;i<items.length;i++){
    if(items[i].type.indexOf("image")!==-1){
      const blob=items[i].getAsFile();
      document.getElementById("output").innerText="Reading screenshot...";
      try{
        const { data:{ text } } = await Tesseract.recognize(blob,'eng');
        const response=getResponse(text);
        document.getElementById("output").innerText="Detected text: "+text+"\n\nAI Response: "+response;
      }catch(err){ document.getElementById("output").innerText="Error reading image: "+err; }
    }
  }
});

// Initialize Q&A manage panel
updateQAManage();
</script>
</body>
</html>
