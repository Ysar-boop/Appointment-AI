<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Appointment AI Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <style>
    /* ===== Body & Fonts ===== */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0F172A;
      color: white;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 900px;
      max-width: 95%;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 { margin-bottom: 10px; text-align: center; }

    /* ===== Panels ===== */
    .panel {
      background: #f3f4f6;
      color: #111;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .panel h3 { margin-top: 0; }

    /* ===== Inputs & Buttons ===== */
    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background: #3B82F6;
      color: white;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
      transition: all 0.2s;
    }

    button:hover { background: #2563EB; }

    /* ===== Output Display ===== */
    #output {
      background: #1E293B;
      border-radius: 12px;
      padding: 20px;
      min-height: 100px;
      white-space: pre-wrap;
    }

    /* ===== Shortcut Buttons ===== */
    .shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .shortcut-btn {
      background: #10B981;
      color: white;
      border-radius: 8px;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .shortcut-btn:hover { background: #059669; }

    /* ===== Q&A Entries ===== */
    .qa-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #e5e7eb;
      padding: 8px;
      border-radius: 8px;
      margin-top: 5px;
    }

    .qa-entry span { flex: 1; }

    .qa-entry button { margin-left: 5px; background: #f87171; color: white; padding: 6px 10px; border-radius: 6px; }
    .qa-entry button:hover { background: #ef4444; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .container { width: 100%; }
      .shortcuts { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Appointment AI</h1>

    <!-- Output Display -->
    <div id="output">Response will appear here...</div>

    <!-- Input Section -->
    <div class="panel">
      <input type="text" id="userInput" placeholder="Type customer message here..." />
      <button onclick="handleSubmit()">Submit</button>

      <input type="file" id="imageUpload" accept="image/*">
      <button onclick="handleImage()">Upload Screenshot</button>

      <!-- Shortcut buttons -->
      <div class="shortcuts">
        <button class="shortcut-btn" onclick="quickReply('too expensive')">Too Expensive</button>
        <button class="shortcut-btn" onclick="quickReply('already have marketing')">Already Have Marketing</button>
        <button class="shortcut-btn" onclick="quickReply('busy call later')">Busy / Call Later</button>
        <button class="shortcut-btn" onclick="quickReply('not interested')">Not Interested</button>
      </div>
    </div>

    <!-- Add Q&A Panel -->
    <div class="panel">
      <h3>Add New Q&A</h3>
      <input type="text" id="newKeywords" placeholder="Enter keywords (comma-separated)">
      <textarea id="newAnswer" placeholder="Enter the answer"></textarea>
      <button id="addQBtn">Add Q&A</button>
    </div>

    <!-- Manage Q&A Panel -->
    <div class="panel">
      <h3>Manage Existing Q&A</h3>
      <div id="qaList"></div>
    </div>
  </div>

  <script>
    // Knowledge base
    let knowledgeBase = [
      { keywords: ["price", "cost", "how much"], response: "Our service helps improve your Google visibility. Pricing depends on your needs, but I can connect you with a specialist." },
      { keywords: ["not interested", "no thanks"], response: "Totally understand! Are you getting consistent leads from Google?" },
      { keywords: ["busy", "call later"], response: "No problem! When would be a better time for a quick call?" },
      { keywords: ["what is this", "who are you"], response: "We help local businesses improve their Google presence and get more customers." },
      { keywords: ["already have", "we have marketing"], response: "That’s great! Most of our clients already have marketing. We just help improve their Google results." },
      { keywords: ["send info", "email me"], response: "I can send info, but most owners prefer a quick call. Would a short call work?" }
    ];

    // Display Q&A list
    function updateQAManage() {
      const qaList = document.getElementById('qaList');
      qaList.innerHTML = '';
      knowledgeBase.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'qa-entry';
        div.innerHTML = `<span><b>Keywords:</b> ${item.keywords.join(', ')}<br><b>Answer:</b> ${item.response}</span>
                         <button onclick="editQA(${index})">Edit</button>
                         <button onclick="deleteQA(${index})">Delete</button>`;
        qaList.appendChild(div);
      });
    }

    function editQA(index) {
      const newKeywords = prompt("Edit keywords (comma separated):", knowledgeBase[index].keywords.join(', '));
      const newAnswer = prompt("Edit answer:", knowledgeBase[index].response);
      if (newKeywords !== null && newAnswer !== null) {
        knowledgeBase[index].keywords = newKeywords.split(',').map(k => k.trim());
        knowledgeBase[index].response = newAnswer.trim();
        updateQAManage();
        alert("Q&A updated!");
      }
    }

    function deleteQA(index) {
      if (confirm("Are you sure you want to delete this entry?")) {
        knowledgeBase.splice(index, 1);
        updateQAManage();
      }
    }

    // Add new Q&A
    document.getElementById('addQBtn').addEventListener('click', () => {
      const keywords = document.getElementById('newKeywords').value.trim().toLowerCase().split(',').map(k => k.trim()).filter(k => k);
      const answer = document.getElementById('newAnswer').value.trim();
      if (keywords.length && answer) {
        knowledgeBase.push({ keywords, response: answer });
        document.getElementById('newKeywords').value = '';
        document.getElementById('newAnswer').value = '';
        updateQAManage();
        alert("New Q&A added!");
      } else { alert("Please fill both keywords and answer."); }
    });

    // AI response
    function getResponse(input) {
      input = input.toLowerCase();
      for (let item of knowledgeBase) {
        for (let keyword of item.keywords) {
          if (input.includes(keyword)) return item.response;
        }
      }
      return "Got it! Can you tell me a bit more so I can assist you better?";
    }

    function handleSubmit() {
      const input = document.getElementById("userInput").value;
      document.getElementById("output").innerText = getResponse(input);
    }

    // Quick shortcut reply
    function quickReply(keyword) {
      document.getElementById("output").innerText = getResponse(keyword);
    }

    // Screenshot OCR
    function handleImage() {
      const file = document.getElementById('imageUpload').files[0];
      if (!file) { alert("Please select an image first."); return; }
      document.getElementById('output').innerText = "Reading screenshot...";
      Tesseract.recognize(file, 'eng', { logger: m => console.log(m) })
        .then(({ data: { text } }) => {
          const response = getResponse(text);
          document.getElementById('output').innerText = "Detected text: " + text + "\n\nAI Response: " + response;
        })
        .catch(err => { document.getElementById('output').innerText = "Error reading image: " + err; });
    }

    // Initialize
    updateQAManage();
  </script>
</body>
