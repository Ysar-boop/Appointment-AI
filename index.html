<!DOCTYPE html>
<html>
<head>
    <title>Appointment-AI</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f172a; color:white;">

    <!-- HEADER -->
    <div style="padding:20px; text-align:center; background:#020617;">
        <h1 style="margin:0; color:#38bdf8;">Appointment-AI</h1>
        <p style="margin:5px; color:#94a3b8;">Smart Knowledge Base Tool</p>
    </div>

    <!-- MAIN CONTAINER -->
    <div style="padding:20px; max-width:1000px; margin:auto;">

        <!-- BUTTONS -->
        <div style="text-align:center; margin-bottom:20px;">
            <button onclick="addNote()" style="padding:10px 20px; margin:5px; background:#38bdf8; border:none; border-radius:6px; font-weight:bold;">Add Note</button>
            <button onclick="deleteNote()" style="padding:10px 20px; margin:5px; background:#f87171; border:none; border-radius:6px; font-weight:bold;">Delete</button>
            <button onclick="addQA()" style="padding:10px 20px; margin:5px; background:#4ade80; border:none; border-radius:6px; font-weight:bold;">Add Q&A</button>
        </div>

        <!-- NOTES -->
        <h2 style="color:#38bdf8;">Notes</h2>
        <div id="notesContainer" style="display:flex; flex-wrap:wrap; gap:15px;"></div>

        <!-- QA -->
        <h2 style="color:#4ade80; margin-top:30px;">Questions & Answers</h2>
        <div id="qaSection"></div>

    </div>

<script>
const notesContainer = document.getElementById('notesContainer');
const qaSection = document.getElementById('qaSection');

const colors = ['#38bdf8','#facc15','#f87171','#4ade80','#a78bfa'];

function addNote(){
    const note = document.createElement('div');
    note.contentEditable = true;
    note.innerText = "Type here...";
    note.style = `
        width:180px;
        height:130px;
        padding:12px;
        border-radius:10px;
        font-weight:bold;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        color:black;
        box-shadow:0 4px 10px rgba(0,0,0,0.5);
    `;
    notesContainer.appendChild(note);
}

function deleteNote(){
    const notes = notesContainer.children;
    if(notes.length > 0){
        notesContainer.removeChild(notes[notes.length - 1]);
    }
}

function addQA(){
    const q = prompt("Enter Question:");
    const a = prompt("Enter Answer:");

    if(q && a){
        const box = document.createElement('div');
        box.style = `
            background:#020617;
            padding:15px;
            border-radius:10px;
            margin-top:10px;
            border-left:5px solid #38bdf8;
        `;

        box.innerHTML = `
            <div style="color:#38bdf8; font-weight:bold;">Q: ${q}</div>
            <div style="color:#facc15; margin-top:5px;">A: ${a}</div>
        `;

        qaSection.appendChild(box);
    }
}
</script>

</body>
</html>
